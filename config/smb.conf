# =============================================================================
# Samba Konfiguration - NT 4.0 kompatibel
# PDF Print Server fuer Keysight VEE → Epson ET-2820
# =============================================================================

[global]
   workgroup = WORKGROUP
   server string = PDF Print Server
   netbios name = PRINTSERVER

   # ── NT 4.0 Kompatibilitaet ──────────────────────────────────────────────
   server min protocol = NT1
   client min protocol = NT1
   ntlm auth = yes
   lanman auth = yes
   client lanman auth = yes
   client ntlmv2 auth = no
   raw NTLMv2 auth = yes

   # Alte Passwoerter erlauben
   encrypt passwords = yes
   passdb backend = tdbsam

   # ── Netzwerk ────────────────────────────────────────────────────────────
   interfaces = eth0
   bind interfaces only = no
   name resolve order = bcast host lmhosts wins

   # NetBIOS/WINS
   wins support = yes
   local master = yes
   preferred master = yes
   os level = 65

   # ── Sicherheit ──────────────────────────────────────────────────────────
   security = user
   map to guest = Bad User
   guest account = nobody

   # ── Logging ─────────────────────────────────────────────────────────────
   log file = /var/log/samba/log.%m
   max log size = 1000
   log level = 1

   # ── Drucken deaktivieren (wir nutzen CUPS direkt) ──────────────────────
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

# =============================================================================
# Druckauftraege-Freigabe (Hauptfreigabe fuer PDF-Dateien)
# =============================================================================
[druckauftraege]
   path = /srv/samba/druckauftraege
   comment = PDF Druckauftraege
   browseable = yes
   writable = yes
   guest ok = yes
   public = yes
   force user = nobody
   force group = nogroup
   create mask = 0666
   directory mask = 0777

   # Alte Clients unterstuetzen
   veto files = /._*/.DS_Store/
   delete veto files = yes
